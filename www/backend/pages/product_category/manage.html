<div class="container-fluid">
  <div class="row page-head">
    <div class="col p-0">
      <h1>
        <i class="fa fa-fw fa-book-open op-2"></i> Modifica Categoria Prodotto
      </h1>
    </div>
  </div>

  <form action="#" id="categoryForm">
    <div class="row">
      <div class="col-lg-8">
        <div class="row">
          <div class="col">
            <nav>
              <div class="nav nav-tabs" id="nav-tab" role="tablist"></div>
            </nav>

            <div class="card mb-3 border-0">
              <div class="card-body">
                <div class="tab-content" id="nav-tabContent"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card mb-3 shadow">
          <div class="card-body">
            <div class="row">
              <div class="col">
                <div class="form-group" id="modifiers">
                  <span><b>Creato da:</b> <i name="CreatorName"></i></span><br />
                  <span><b>Ultima modifica:</b> <i name="ModifierName"></i></span>
                </div>
                <div class="form-group" id="dates">
                  <span><b>Creato il:</b> <i name="InsertDate"></i></span><br />
                  <span><b>Ultima modifica:</b> <i name="UpdateDate"></i></span>
                </div>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="row align-items-center">
              <div class="col-6">
                <button type="button" class="btn btn-sm btn-link text-danger" id="deleteButton" onclick="deleteCategory()"
                  disabled>
                  <i class="fas fa-trash"></i> Elimina
                </button>
              </div>

              <div class="col-6 text-end">
                <button type="button" class="btn btn-success" onclick="saveCategory()">
                  <i class="fas fa-fw fa-save"></i> Salva
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<script type="text/html" id="language_tab_template">
  <form
    class="tab-pane fade"
    id="tabLang-{{Language}}"
    name="tabLang"
    role="tabpanel"
    aria-labelledby="tabLang-{{Language}}-tab"
    language="{{Language}}"
  >
    <div class="row">
      <div class="col-12">
        <div class="form-group">
          <label>Nome *</label>
          <input
            type="text"
            name="Name"
            id="Name-{{Language}}"
            class="form-control check"
            needed
          />
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="form-group">
          <label>Contenuto</label>
          <textarea
            name="Description"
            id="Description-{{Language}}"
            class="form-control js-editor check"
            rows="18"
          ></textarea>
        </div>
      </div>
    </div>
    <input type="hidden" name="Update" id="Update-{{Language}}" />
  </form>
</script>
